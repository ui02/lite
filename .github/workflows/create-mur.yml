name: Create Post

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  test:
    if: startsWith(github.event.issue.title, 'post:')
    runs-on: ubuntu-latest

    steps:
      - name: Show issue information
        run: |
          echo "New post detected!"
          echo "Title: ${{ github.event.issue.title }}"
          echo "Body:"
          echo "${{ github.event.issue.body }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test file
        run: |
          mkdir -p content/posts
          TITLE="${{ github.event.issue.title }}"
          TITLE="${TITLE#post: }"

          BODY="${{ github.event.issue.body }}"

          FILE="content/mur/test.md"

          cat > "$FILE" <<EOF
          ---
          title: "$TITLE"
          date: $(TZ=Asia/Tokyo date +"%Y-%m-%dT%H:%M:%S%:z")
          type: mur
          draft: false
          images: []
          ---

          $BODY
          EOF

      - name: Commit test file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add content/mur/test.md

          git commit -m "test: create markdown file" || echo "No changes"

          git push