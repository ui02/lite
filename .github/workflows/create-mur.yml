name: Create Post

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  test:
    if: startsWith(github.event.issue.title, 'mur:')
    runs-on: ubuntu-latest

    steps:
      - name: Show issue information
        run: |
          echo "New post detected!"
          echo "Title: ${{ github.event.issue.title }}"
          echo "Body:"
          echo "${{ github.event.issue.body }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate markdown
        run: |
          mkdir -p content/mur

          BODY="${{ github.event.issue.body }}"

          IMAGES=$(echo "$BODY" | sed -n '/<!-- IMAGES -->/,/<!-- IMAGES -->/p' | grep "static/images" || true)

          DATE=$(TZ=Asia/Tokyo date +"%Y-%m-%dT%H:%M:%S%:z")

          FILENAME=$(TZ=Asia/Tokyo date +"%Y%m%d%H%M%S")

          FILE="content/mur/${FILENAME}.md"

          {
            echo "---"
            echo "date: $DATE"
            echo "type: mur"
            echo "draft: false"
            echo "images:"
            while IFS= read -r image; do
              echo "  - ${image#static}"
            done <<< "$IMAGES"
            echo "---"
            echo
            echo "$BODY" | sed '/<!-- IMAGES -->/,$d'
          } > "$FILE"

      - name: Commit mur post
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add content/mur/

          git commit -m "feat: add mur post" || echo "No changes"

          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });